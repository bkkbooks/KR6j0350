body:
  text: 特進試鴻臚卿大辨正大廣智三藏奉詔譯爾時毘盧遮那如來於色界頂第四禪成等正覺即下須彌山頂於金剛寶樓閣盡虛空遍法界一切如來皆悉雲集前後圍繞異口同音唯願世尊轉妙法輪甚深祕密所謂金剛界輪降三世教令輪遍調伏法輪一切義成就輪如是四輪從毘盧遮那心出一一輪皆有三十七聖者一一真言一一三摩地一一契印威儀軌持大悲願力於雜染佛剎於淨妙世界或隱或顯轉輪利樂度諸眾生各各不同毘盧遮那佛受諸如來請已欲轉法輪時即入三摩地觀見摩醯首羅大自在天剛強難化執持邪見非我寂靜大悲之身堪任調伏於是世尊入悲怒三摩地從胸臆間出現五峯金剛大菩提心流出四面八臂威德熾盛奇特難覩降三世金剛菩薩身遍禮毘盧遮那如來及一切諸佛唯願世尊示教於我何所作為佛告降三世菩薩汝今降伏彼難調伏諸大天等令悉歸依諸佛法僧發菩提心尋即降伏一切諸天盡皆歸依佛法僧眾唯大自在天特大威德而生拒敵降三世菩薩種種苦治乃至於死左踏大天右踏天后於是毘盧遮那如來入大悲愍三摩地已即說金剛壽命陀羅尼復入金剛壽命三昧耶及結密印加持摩醯首羅天王還復得甦重增壽命歸依諸佛發菩提心灌頂受記證得八地位金剛壽命真言唵嚩日囉二合喻曬􅁥薩嚩二合訶引佛告執金剛菩薩若有善男子善女人受持念誦每日三時時別千遍過現所有惡業因緣短命夭壽由持此真言故信心清淨業障消滅更增壽命若有修習三摩地者現生不轉父母生身獲五神通陵空自在次當誦護身被甲真言曰唵砧讁簪反嚩日囉二合欲次當觀欲字光明晃曜遍照成大金剛壽命菩薩次以四字明引請菩薩降入壇中受諸供養四字密言曰惹吽鑁斛爾時大眾聞佛所說信受奉行延寶四年五月寫栂尾藏本律師淨嚴天明元辛丑年寫宇治慧心院本慈忍今年得件本令寫之挍勘以印版蓋此經者前經之略出為不堪者唯示眼精非是別本也和州長谷寺寓居劬勞釋快道記一挍加筆畢癸亥四月六日慈順
